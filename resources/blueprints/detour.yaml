title: Detour
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: from
            field:
              type: text
              display: From
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: to
            field:
              type: text
              display: To
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: type
            field:
              options:
                -
                  key: path
                  value: Path
                -
                  key: regex
                  value: Regex
              max_items: 1
              default: path
              type: select
              display: Type
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: code
            field:
              options:
                -
                  key: 301
                  value: '301'
                -
                  key: 302
                  value: '302'
                -
                  key: 307
                  value: '307'
                -
                  key: 308
                  value: '308'
              max_items: 1
              default: '302'
              type: select
              display: Code
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: sites
            field:
              mode: select
              type: sites
              display: Sites
              instructions: 'Can be left empty to add the detour for all sites.'
              icon: sites
              localizable: false
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 100
          -
            handle: query_string_handling
            field:
              options:
                -
                  key: use_global
                  value: Use global default
                -
                  key: pass_through
                  value: Pass through
                -
                  key: strip_completely
                  value: Strip completely
                -
                  key: strip_specific_keys
                  value: Strip specific keys
              max_items: 1
              default: use_global
              type: select
              display: Query string handling
              instructions: Use global default configured on the settings page or override it for this detour.
              localizable: false
              width: 50
          -
            handle: query_string_strip_keys
            field:
              type: text
              display: Query string keys to strip
              instructions: Comma-separated list, e.g. gclid,fbclid
              localizable: false
              width: 50
              if:
                query_string_handling: strip_specific_keys